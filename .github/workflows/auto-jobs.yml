name: Auto-Update GCC Jobs

on:
  workflow_dispatch: # Allows you to click a button to run it manually anytime
  schedule:
    - cron: '0 6 * * *' # Runs automatically every day at 6:00 AM UTC

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Job Agent Script
        run: python agent.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update job listings [skip ci]" && git push)
